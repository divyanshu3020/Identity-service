version: '3.8'

services:
  identity-service:
    build:
      context: . # Standalone context
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgrespassword@identity-postgres:5432/parking_db
      - API_PREFIX=/api
    depends_on:
      identity-postgres:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules

  identity-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: parking_db
    ports:
      - "5433:5432" # Use 5433 on host so it doesn't conflict with your existing local postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - identity_pg_data:/var/lib/postgresql/data

volumes:
  identity_pg_data:
